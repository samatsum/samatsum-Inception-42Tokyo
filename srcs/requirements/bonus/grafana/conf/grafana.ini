[server]
protocol = http
http_port = 3000
domain = samatsum.42.fr
root_url = http://samatsum.42.fr/grafana
serve_from_sub_path = true

[security]
allow_embedding = true

[paths]
data = /var/lib/grafana
logs = /var/log/grafana
plugins = /var/lib/grafana/plugins
# ★追加: プロビジョニングファイルを読みに行く場所を明示的に指定
provisioning = /etc/grafana/provisioning

[users]
allow_sign_up = false

[auth.anonymous]
enabled = false